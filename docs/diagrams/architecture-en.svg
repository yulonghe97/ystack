<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" width="780" height="340">
  <defs>
    <style>
      .title { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-size: 17px; font-weight: 600; fill: #0f172a; }
      .subtitle { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-size: 10px; font-weight: 500; fill: #64748b; text-transform: uppercase; letter-spacing: 0.08em; }
      .reg { font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; font-weight: 500; fill: #ffffff; }
      .reg-sub { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-size: 10px; fill: rgba(255,255,255,0.5); }
      .col-name { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #0f172a; }
      .col-path { font-family: 'Consolas', 'Monaco', monospace; font-size: 10px; fill: #64748b; }
      .col-role { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-size: 11px; font-weight: 600; fill: #0f172a; }
      .col-desc { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #64748b; }
      .col-detail { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-size: 10px; fill: #64748b; }
      .flow { font-family: 'Consolas', 'Monaco', monospace; font-size: 10px; fill: #64748b; }
      .flow-bold { font-family: 'Consolas', 'Monaco', monospace; font-size: 10px; font-weight: 600; fill: #0f172a; }
      .arrow-text { font-family: 'Consolas', 'Monaco', monospace; font-size: 9px; fill: #64748b; letter-spacing: 0.05em; }
      .footer { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-size: 10px; fill: #64748b; }
      .footer-code { font-family: 'Consolas', 'Monaco', monospace; font-size: 10px; fill: #64748b; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="780" height="340" fill="#f8fafc"/>
  <!-- Canvas -->
  <rect x="16" y="16" width="748" height="308" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Header -->
  <text x="40" y="46" class="title">Architecture Overview</text>
  <text x="728" y="46" class="subtitle" text-anchor="end">Three Layers + Module Registry</text>
  <line x1="40" y1="56" x2="740" y2="56" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Registry Bar (spans full width) -->
  <rect x="40" y="68" width="700" height="32" fill="#0f172a"/>
  <text x="56" y="89" class="reg">.ystack/config.json</text>
  <text x="390" y="89" class="reg-sub" text-anchor="middle">(Module Registry)</text>

  <!-- Three columns container -->
  <!-- Column borders -->
  <rect x="40" y="100" width="234" height="170" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="273" y="100" width="234" height="170" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="506" y="100" width="234" height="170" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Column 1: Docs -->
  <text x="56" y="122" class="col-name">Docs (MDX)</text>
  <line x1="56" y1="129" x2="130" y2="129" stroke="#0f172a" stroke-width="2"/>
  <text x="56" y="148" class="col-role">What it IS</text>
  <text x="56" y="164" class="col-detail">Final specs</text>
  <text x="56" y="178" class="col-detail">Design truth</text>

  <!-- Column 2: Progress -->
  <text x="289" y="122" class="col-name">Progress</text>
  <text x="352" y="122" class="col-path">(.ystack/)</text>
  <line x1="289" y1="129" x2="380" y2="129" stroke="#0f172a" stroke-width="2"/>
  <text x="289" y="148" class="col-role">What's DONE</text>
  <text x="289" y="164" class="col-detail">What's LEFT</text>
  <text x="289" y="178" class="col-detail">State layer</text>

  <!-- Column 3: Code -->
  <text x="522" y="122" class="col-name">Code</text>
  <line x1="522" y1="129" x2="564" y2="129" stroke="#0f172a" stroke-width="2"/>
  <text x="522" y="148" class="col-role">The actual</text>
  <text x="522" y="164" class="col-detail">implementation</text>
  <text x="522" y="178" class="col-detail">Lives here</text>

  <!-- Flow arrows row (the key relationship) -->
  <!-- Left arrow: agents read <── -->
  <text x="56" y="242" class="flow-bold">agents read</text>
  <!-- Arrow pointing left from Progress to Docs -->
  <line x1="137" y1="238" x2="268" y2="238" stroke="#0f172a" stroke-width="1"/>
  <polygon points="137,238 143,234 143,242" fill="#0f172a"/>

  <!-- Center label: tracks -->
  <text x="289" y="242" class="flow">── tracks ──</text>

  <!-- Right arrow: ──> agents write -->
  <line x1="385" y1="238" x2="516" y2="238" stroke="#0f172a" stroke-width="1"/>
  <polygon points="516,238 510,234 510,242" fill="#0f172a"/>
  <text x="522" y="242" class="flow-bold">agents write</text>

  <!-- Vertical dashed lines connecting flow to columns -->
  <line x1="157" y1="186" x2="157" y2="230" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="390" y1="186" x2="390" y2="230" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="623" y1="186" x2="623" y2="230" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Footer -->
  <line x1="40" y1="284" x2="740" y2="284" stroke="#cbd5e1" stroke-width="1"/>
  <text x="40" y="302" class="footer">Each module maps one doc page to a code scope via</text>
  <rect x="319" y="290" width="83" height="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="324" y="302" class="footer-code">config.json</text>
</svg>
