<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" width="780" height="340">
  <defs>
    <style>
      .title { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Inter', system-ui, sans-serif; font-size: 17px; font-weight: 600; fill: #0f172a; }
      .subtitle { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Inter', system-ui, sans-serif; font-size: 10px; font-weight: 500; fill: #64748b; letter-spacing: 0.08em; }
      .reg { font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; font-weight: 500; fill: #ffffff; }
      .reg-sub { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, sans-serif; font-size: 10px; fill: rgba(255,255,255,0.5); }
      .col-name { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #0f172a; }
      .col-path { font-family: 'Consolas', 'Monaco', monospace; font-size: 10px; fill: #64748b; }
      .col-role { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 600; fill: #0f172a; }
      .col-desc { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Inter', system-ui, sans-serif; font-size: 11px; fill: #64748b; }
      .col-detail { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Inter', system-ui, sans-serif; font-size: 10px; fill: #64748b; }
      .flow { font-family: 'Consolas', 'Monaco', monospace; font-size: 10px; fill: #64748b; }
      .flow-bold { font-family: 'PingFang SC', 'Consolas', 'Monaco', monospace; font-size: 10px; font-weight: 600; fill: #0f172a; }
      .footer { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Inter', system-ui, sans-serif; font-size: 10px; fill: #64748b; }
      .footer-code { font-family: 'Consolas', 'Monaco', monospace; font-size: 10px; fill: #64748b; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="780" height="340" fill="#f8fafc"/>
  <!-- Canvas -->
  <rect x="16" y="16" width="748" height="308" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Header -->
  <text x="40" y="46" class="title">架构概览</text>
  <text x="728" y="46" class="subtitle" text-anchor="end">三层架构 + 模块注册表</text>
  <line x1="40" y1="56" x2="740" y2="56" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Registry Bar -->
  <rect x="40" y="68" width="700" height="32" fill="#0f172a"/>
  <text x="56" y="89" class="reg">.ystack/config.json</text>
  <text x="390" y="89" class="reg-sub" text-anchor="middle">（模块注册表）</text>

  <!-- Three columns -->
  <rect x="40" y="100" width="234" height="170" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="273" y="100" width="234" height="170" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="506" y="100" width="234" height="170" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Column 1: 文档 -->
  <text x="56" y="122" class="col-name">文档 (MDX)</text>
  <line x1="56" y1="129" x2="130" y2="129" stroke="#0f172a" stroke-width="2"/>
  <text x="56" y="148" class="col-role">系统的最终状态</text>
  <text x="56" y="164" class="col-detail">完成的规格定义</text>
  <text x="56" y="178" class="col-detail">设计真相</text>

  <!-- Column 2: 进度 -->
  <text x="289" y="122" class="col-name">进度</text>
  <text x="330" y="122" class="col-path">(.ystack/)</text>
  <line x1="289" y1="129" x2="380" y2="129" stroke="#0f172a" stroke-width="2"/>
  <text x="289" y="148" class="col-role">已完成的工作</text>
  <text x="289" y="164" class="col-detail">待完成的任务</text>
  <text x="289" y="178" class="col-detail">状态层</text>

  <!-- Column 3: 代码 -->
  <text x="522" y="122" class="col-name">代码</text>
  <line x1="522" y1="129" x2="564" y2="129" stroke="#0f172a" stroke-width="2"/>
  <text x="522" y="148" class="col-role">实际实现</text>
  <text x="522" y="164" class="col-detail">代码在此</text>

  <!-- Flow arrows row -->
  <text x="56" y="242" class="flow-bold">Agent 读取</text>
  <line x1="130" y1="238" x2="268" y2="238" stroke="#0f172a" stroke-width="1"/>
  <polygon points="130,238 136,234 136,242" fill="#0f172a"/>

  <text x="289" y="242" class="flow">── 追踪 ──</text>

  <line x1="370" y1="238" x2="516" y2="238" stroke="#0f172a" stroke-width="1"/>
  <polygon points="516,238 510,234 510,242" fill="#0f172a"/>
  <text x="522" y="242" class="flow-bold">Agent 编写</text>

  <!-- Vertical dashed connectors -->
  <line x1="157" y1="186" x2="157" y2="230" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="390" y1="186" x2="390" y2="230" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="623" y1="186" x2="623" y2="230" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Footer -->
  <line x1="40" y1="284" x2="740" y2="284" stroke="#cbd5e1" stroke-width="1"/>
  <text x="40" y="302" class="footer">每个模块通过</text>
  <rect x="118" y="290" width="83" height="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="123" y="302" class="footer-code">config.json</text>
  <text x="208" y="302" class="footer">将一个文档页面映射到一个代码范围</text>
</svg>
